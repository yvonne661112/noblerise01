name: Deploy Astro to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # 與 deploy.yml（GitHub Pages）保持一致：補一份底線版 sitemap，
      # 避免舊 GSC 索引中斷。詳細背景見 deploy.yml。
      - run: cp dist/sitemap-index.xml dist/sitemap_index.xml
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # commit-message / commit-hash 強制使用 SHA（純 ASCII），
          # 否則 CJK 字元會被 Cloudflare API 以 "Invalid commit message" (code 8000111) 拒絕。
          command: pages deploy ./dist --project-name=noblerise01 --branch=main --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}
